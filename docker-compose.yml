services:
  swarm-api:
    build: .
    command: node dist/bootstrap/api.js
    restart: unless-stopped
    env_file: .env
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  swarm-worker:
    build: .
    command: node dist/bootstrap/worker.js
    restart: unless-stopped
    env_file: .env
    depends_on:
      swarm-api:
        condition: service_healthy
